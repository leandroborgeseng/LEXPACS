# LEX PACS — edge TLS (80/443 + Let's Encrypt)
#
# Uso em VPS/servidor próprio (sem Coolify):
#   cp .env.coolify.example .env.coolify
#   # Preencha LEX_PACS_DOMAIN, LETSENCRYPT_EMAIL, OHIF_VIEWER_URL=https://...
#   docker compose -f docker-compose.coolify.yml \
#     -f docker-compose.tls.yml \
#     --env-file .env.coolify up -d --build
#
# No Coolify NÃO use este arquivo — o Traefik já termina TLS e expõe 80/443.

services:
  edge:
    image: caddy:2-alpine
    container_name: edge
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      LEX_PACS_DOMAIN: ${LEX_PACS_DOMAIN:?defina LEX_PACS_DOMAIN}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:?defina LETSENCRYPT_EMAIL}
    volumes:
      - ./ohif-viewer/nginx/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      gateway:
        condition: service_healthy

volumes:
  caddy-data:
  caddy-config:
