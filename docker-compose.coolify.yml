# LEX PACS — stack para Coolify (Docker Compose)
#
# No Coolify:
#   - Tipo: Docker Compose (GitHub)
#   - Compose file: docker-compose.coolify.yml
#   - Um único domínio público → serviço `gateway` (Traefik :80/:443 + Let's Encrypt)
#   - Auth OIDC na rede interna; exposto em /auth/ via gateway
#   - Variáveis: ver .env.coolify.example e docs/COOLIFY.md
#
# VPS standalone (80/443 + Let's Encrypt via Caddy):
#   docker compose -f docker-compose.coolify.yml -f docker-compose.tls.yml --env-file .env.coolify up -d
#   Ver docs/TLS-E-DOMINIO.md
#
# Desenvolvimento local:
#   cp .env.coolify.example .env.coolify
#   docker compose -f docker-compose.coolify.yml -f docker-compose.coolify.local.yml --env-file .env.coolify up -d --build

name: lex-pacs

services:
  auth-realm-init:
    image: "lex-pacs/auth-realm-init:${LEX_PACS_VERSION:-0.7.0}"
    build:
      context: ./ohif-viewer/keycloak
      dockerfile: Dockerfile.realm-init
    environment:
      OHIF_VIEWER_URL: ${OHIF_VIEWER_URL:-http://localhost:3000}
      OIDC_PUBLIC_ISSUER_URL: ${OIDC_PUBLIC_ISSUER_URL:-}
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL:-}
      KEYCLOAK_HTTP_RELATIVE_PATH: ${KEYCLOAK_HTTP_RELATIVE_PATH:-/auth}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-lex-clinical-dev-secret}
      KEYCLOAK_SSL_REQUIRED: ${KEYCLOAK_SSL_REQUIRED:-none}
    volumes:
      - auth-realm-import:/output
    restart: "no"

  database:
    image: postgres:16-alpine
    container_name: database
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-orthanc}
      POSTGRES_USER: ${POSTGRES_USER:-orthanc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD}
    volumes:
      - database-data:/var/lib/postgresql/data
      - ./ohif-viewer/postgres/init-lex-mwl.sql:/docker-entrypoint-initdb.d/10-lex-mwl.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orthanc} -d ${POSTGRES_DB:-orthanc}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  database-password-sync:
    image: postgres:16-alpine
    network_mode: "service:database"
    depends_on:
      database:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-orthanc}
      POSTGRES_DB: ${POSTGRES_DB:-orthanc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD}
    volumes:
      - ./ohif-viewer/postgres/sync-password.sh:/sync-password.sh:ro
    entrypoint: ["/bin/sh", "/sync-password.sh"]
    restart: "no"

  auth:
    image: quay.io/keycloak/keycloak:26.0
    container_name: auth
    command: start-dev --import-realm --http-port=8080 --http-relative-path=${KEYCLOAK_HTTP_RELATIVE_PATH:-/auth}
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?defina KEYCLOAK_ADMIN_PASSWORD}
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_HTTP_RELATIVE_PATH: ${KEYCLOAK_HTTP_RELATIVE_PATH:-/auth}
      KC_PROXY: ${KEYCLOAK_PROXY:-edge}
      KC_HOSTNAME: ${KEYCLOAK_PUBLIC_HOSTNAME:-${LEX_PACS_DOMAIN:-}}
      KC_HOSTNAME_STRICT: ${KEYCLOAK_HOSTNAME_STRICT:-false}
    volumes:
      - auth-realm-import:/opt/keycloak/data/import
    expose:
      - "8080"
    depends_on:
      auth-realm-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD-SHELL
        - |
          path="$${KC_HTTP_RELATIVE_PATH:-/auth}"
          path="$${path%/}"
          exec 3<>/dev/tcp/127.0.0.1/8080 && \
          printf "GET $${path}/realms/lex-pacs HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3 && \
          head -1 <&3 | grep -q '200'
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s
    restart: unless-stopped

  server:
    image: "lex-pacs/orthanc:${LEX_PACS_VERSION:-0.7.0}"
    container_name: server
    build:
      context: ./ohif-viewer/orthanc
      dockerfile: Dockerfile
    environment:
      POSTGRES_HOST: database
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-orthanc}
      POSTGRES_DB: ${POSTGRES_DB:-orthanc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD}
    ports:
      - "${DICOM_PORT:-4242}:4242"
    volumes:
      - server-config:/orthanc-config
      - server-data:/var/lib/orthanc/storage
      - server-worklists:/var/lib/orthanc/worklists
    depends_on:
      database:
        condition: service_healthy
      database-password-sync:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "pid=$(cat /orthanc-config/orthanc.pid 2>/dev/null) && kill -0 \"$$pid\" 2>/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 120s
    restart: unless-stopped

  web-viewer:
    image: "lex-pacs/viewer:${LEX_PACS_VERSION:-0.7.0}"
    container_name: web-viewer
    build:
      context: ./ohif-viewer
      dockerfile: Dockerfile
      target: ohif
      args:
        LEX_PACS_VERSION: ${LEX_PACS_VERSION:-0.7.0}
    expose:
      - "80"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  portal:
    image: "lex-pacs/portal:${LEX_PACS_VERSION:-0.7.0}"
    container_name: portal
    build:
      context: ./lex-pacs-portal
      dockerfile: Dockerfile
      args:
        LEX_PACS_VERSION: ${LEX_PACS_VERSION:-0.7.0}
    expose:
      - "8080"
      - "2575"
    environment:
      ORTHANC_URL: http://server:8042
      OHIF_VIEWER_URL: ${OHIF_VIEWER_URL:?defina OHIF_VIEWER_URL}
      HL7_ORM_ENABLED: ${HL7_ORM_ENABLED:-true}
      HL7_ORM_PORT: ${HL7_ORM_PORT:-2575}
      HL7_ORM_AUTO_SYNC: ${HL7_ORM_AUTO_SYNC:-true}
      MPPS_PORT: ${MPPS_PORT:-4243}
      JWT_SECRET: ${PORTAL_JWT_SECRET:?defina PORTAL_JWT_SECRET}
      PORTAL_FALLBACK_CODE: ${PORTAL_FALLBACK_CODE:-}
      VIEWER_TOKEN_EXPIRE_MINUTES: ${VIEWER_TOKEN_EXPIRE_MINUTES:-30}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      ORTHANC_CONFIG_PATH: /orthanc-config/orthanc.json
      REPORTS_DATA_PATH: /lex-reports
      AUDIT_DATA_PATH: /lex-audit
      ORTHANC_WORKLIST_PATH: /var/lib/orthanc/worklists
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD}
      LEX_PACS_VERSION: ${LEX_PACS_VERSION:-0.7.0}
      OIDC_ENABLED: ${OIDC_ENABLED:-true}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-http://auth:8080/auth/realms/lex-pacs}
      OIDC_PUBLIC_ISSUER_URL: ${OIDC_PUBLIC_ISSUER_URL:-${OHIF_VIEWER_URL}/auth/realms/lex-pacs}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-lex-clinical}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:?defina OIDC_CLIENT_SECRET}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?defina KEYCLOAK_ADMIN_PASSWORD}
      AD_BIND_PASSWORD: ${AD_BIND_PASSWORD:-}
      CLINICAL_LOCAL_AUTH_ENABLED: ${CLINICAL_LOCAL_AUTH_ENABLED:-false}
      CLINICAL_BOOTSTRAP_USER: ${CLINICAL_BOOTSTRAP_USER:-}
      CLINICAL_BOOTSTRAP_PASSWORD: ${CLINICAL_BOOTSTRAP_PASSWORD:-}
      BACKUP_RETENTION_DAILY: ${BACKUP_RETENTION_DAILY:-7}
      BACKUP_RETENTION_WEEKLY: ${BACKUP_RETENTION_WEEKLY:-4}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      BACKUP_INTERVAL_HOURS: ${BACKUP_INTERVAL_HOURS:-24}
      BACKUP_STATUS_PATH: /lex-backups/latest-status.json
      LOGIN_RATE_LIMIT_ATTEMPTS: ${LOGIN_RATE_LIMIT_ATTEMPTS:-20}
      LOGIN_RATE_LIMIT_WINDOW_SECONDS: ${LOGIN_RATE_LIMIT_WINDOW_SECONDS:-60}
    volumes:
      - server-config:/orthanc-config
      - lex-reports:/lex-reports
      - lex-audit:/lex-audit
      - server-worklists:/var/lib/orthanc/worklists
      - clinical-htpasswd:/etc/lex-pacs
      - lex-backups:/lex-backups:ro
    depends_on:
      server:
        condition: service_healthy
      auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  gateway:
    image: "lex-pacs/gateway:${LEX_PACS_VERSION:-0.7.0}"
    container_name: gateway
    build:
      context: ./ohif-viewer/nginx
      dockerfile: Dockerfile
    expose:
      - "80"
    depends_on:
      web-viewer:
        condition: service_healthy
      portal:
        condition: service_healthy
      server:
        condition: service_healthy
      auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/clinica/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  backup:
    image: "lex-pacs/backup:${LEX_PACS_VERSION:-0.7.0}"
    container_name: backup
    build:
      context: ./ohif-viewer/scripts
      dockerfile: Dockerfile.backup
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - lex-backups:/backups
      # Railway: anexe um volume persistente e defina BACKUP_REMOTE_DIR=/railway-backups
      # - railway-backups:/railway-backups
      - ./LEX_PACS_VERSION:/compose/LEX_PACS_VERSION:ro
      - ./docker-compose.coolify.yml:/compose/docker-compose.yml:ro
      - server-config:/orthanc-config
    environment:
      BACKUP_ROOT: /backups
      PORTAL_OPS_ENV: /orthanc-config/portal-ops.env
      COMPOSE_PROJECT_DIR: /compose
      COMPOSE_FILE: /compose/docker-compose.yml
      POSTGRES_USER: ${POSTGRES_USER:-orthanc}
      POSTGRES_DB: ${POSTGRES_DB:-orthanc}
      BACKUP_INTERVAL_HOURS: ${BACKUP_INTERVAL_HOURS:-24}
      BACKUP_RETENTION_DAILY: ${BACKUP_RETENTION_DAILY:-7}
      BACKUP_RETENTION_WEEKLY: ${BACKUP_RETENTION_WEEKLY:-4}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      BACKUP_REMOTE_DIR: ${BACKUP_REMOTE_DIR:-}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:-}
      BACKUP_S3_PREFIX: ${BACKUP_S3_PREFIX:-lex-pacs}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-auto}
    working_dir: /compose
    depends_on:
      database:
        condition: service_healthy
      database-password-sync:
        condition: service_completed_successfully
      portal:
        condition: service_started
    restart: unless-stopped

volumes:
  database-data:
  server-data:
  server-config:
  server-worklists:
  lex-reports:
  lex-audit:
  clinical-htpasswd:
  auth-realm-import:
  lex-backups:
