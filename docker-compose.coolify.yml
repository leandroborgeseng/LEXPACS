# LEX PACS — stack para Coolify (Docker Compose)
#
# No Coolify:
#   - Tipo: Docker Compose (GitHub)
#   - Compose file: docker-compose.coolify.yml
#   - Um único domínio público → serviço `gateway` porta 80
#   - Keycloak fica na rede interna; OIDC em /auth/ via proxy do gateway
#   - Variáveis: ver .env.coolify.example e docs/COOLIFY.md
#
# Desenvolvimento local:
#   cp .env.coolify.example .env.coolify
#   docker compose -f docker-compose.coolify.yml --env-file .env.coolify up -d --build

name: lex-pacs

services:
  keycloak-realm-init:
    image: alpine:3.20
    environment:
      OHIF_VIEWER_URL: ${OHIF_VIEWER_URL:-http://localhost:3000}
      OIDC_PUBLIC_ISSUER_URL: ${OIDC_PUBLIC_ISSUER_URL:-}
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL:-}
      KEYCLOAK_HTTP_RELATIVE_PATH: ${KEYCLOAK_HTTP_RELATIVE_PATH:-/auth}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-lex-clinical-dev-secret}
      KEYCLOAK_SSL_REQUIRED: ${KEYCLOAK_SSL_REQUIRED:-none}
    volumes:
      - ./ohif-viewer/keycloak/lex-pacs-realm.template.json:/template/lex-pacs-realm.template.json:ro
      - keycloak-import:/output
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        apk add --no-cache gettext >/dev/null
        LEX_PUBLIC_URL=$$(echo "$$OHIF_VIEWER_URL" | sed 's:/*$$::')
        KC_PATH=$${KEYCLOAK_HTTP_RELATIVE_PATH:-/auth}
        KC_PATH=$$(echo "$$KC_PATH" | sed 's:/*$$::')
        KEYCLOAK_PUBLIC_URL=$${KEYCLOAK_PUBLIC_URL:-$$LEX_PUBLIC_URL$$KC_PATH}
        OIDC_PUBLIC_ISSUER_URL=$${OIDC_PUBLIC_ISSUER_URL:-$$LEX_PUBLIC_URL$$KC_PATH/realms/lex-pacs}
        export LEX_PUBLIC_URL KEYCLOAK_PUBLIC_URL OIDC_CLIENT_SECRET KEYCLOAK_SSL_REQUIRED
        echo "OIDC público: $$OIDC_PUBLIC_ISSUER_URL"
        case "$$LEX_PUBLIC_URL" in
          https://*) export KEYCLOAK_SSL_REQUIRED=$${KEYCLOAK_SSL_REQUIRED:-external} ;;
        esac
        envsubst '$${LEX_PUBLIC_URL} $${KEYCLOAK_PUBLIC_URL} $${KEYCLOAK_SSL_REQUIRED} $${OIDC_CLIENT_SECRET}' \
          < /template/lex-pacs-realm.template.json > /output/lex-pacs-realm.json
        echo "Keycloak realm gerado para $$LEX_PUBLIC_URL"
    restart: "no"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-orthanc}
      POSTGRES_USER: ${POSTGRES_USER:-orthanc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./ohif-viewer/postgres/init-lex-mwl.sql:/docker-entrypoint-initdb.d/10-lex-mwl.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orthanc} -d ${POSTGRES_DB:-orthanc}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm --http-port=8080 --http-relative-path=${KEYCLOAK_HTTP_RELATIVE_PATH:-/auth}
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?defina KEYCLOAK_ADMIN_PASSWORD}
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_HTTP_RELATIVE_PATH: ${KEYCLOAK_HTTP_RELATIVE_PATH:-/auth}
      KC_PROXY: ${KEYCLOAK_PROXY:-edge}
      KC_HOSTNAME: ${KEYCLOAK_PUBLIC_HOSTNAME:-}
      KC_HOSTNAME_STRICT: ${KEYCLOAK_HOSTNAME_STRICT:-false}
    volumes:
      - keycloak-import:/opt/keycloak/data/import
    expose:
      - "8080"
    depends_on:
      keycloak-realm-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080${KEYCLOAK_HTTP_RELATIVE_PATH:-/auth}/realms/lex-pacs >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s
    restart: unless-stopped

  orthanc:
    image: jodogne/orthanc-plugins:1.12.5
    entrypoint: ["/bin/sh", "/docker-entrypoint.sh"]
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD}
    ports:
      - "${DICOM_PORT:-4242}:4242"
    volumes:
      - ./ohif-viewer/orthanc/orthanc.base.json:/etc/orthanc/orthanc.base.json:ro
      - ./ohif-viewer/orthanc/docker-entrypoint.sh:/docker-entrypoint.sh:ro
      - orthanc-config:/orthanc-config
      - orthanc-storage:/var/lib/orthanc/storage
      - orthanc-worklists:/var/lib/orthanc/worklists
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8042/system"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  ohif:
    image: "lex-pacs/viewer:${LEX_PACS_VERSION:-0.7.0}"
    build:
      context: ./ohif-viewer
      dockerfile: Dockerfile
      target: ohif
      args:
        LEX_PACS_VERSION: ${LEX_PACS_VERSION:-0.7.0}
    expose:
      - "80"
    depends_on:
      orthanc:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  patient-portal:
    image: "lex-pacs/portal:${LEX_PACS_VERSION:-0.7.0}"
    build:
      context: ./lex-pacs-portal
      dockerfile: Dockerfile
      args:
        LEX_PACS_VERSION: ${LEX_PACS_VERSION:-0.7.0}
    expose:
      - "8080"
    environment:
      ORTHANC_URL: http://orthanc:8042
      OHIF_VIEWER_URL: ${OHIF_VIEWER_URL:?defina OHIF_VIEWER_URL}
      JWT_SECRET: ${PORTAL_JWT_SECRET:?defina PORTAL_JWT_SECRET}
      PORTAL_FALLBACK_CODE: ${PORTAL_FALLBACK_CODE:-}
      VIEWER_TOKEN_EXPIRE_MINUTES: ${VIEWER_TOKEN_EXPIRE_MINUTES:-30}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      ORTHANC_CONFIG_PATH: /orthanc-config/orthanc.json
      REPORTS_DATA_PATH: /lex-reports
      AUDIT_DATA_PATH: /lex-audit
      ORTHANC_WORKLIST_PATH: /var/lib/orthanc/worklists
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD}
      LEX_PACS_VERSION: ${LEX_PACS_VERSION:-0.7.0}
      OIDC_ENABLED: ${OIDC_ENABLED:-true}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-http://keycloak:8080/auth/realms/lex-pacs}
      OIDC_PUBLIC_ISSUER_URL: ${OIDC_PUBLIC_ISSUER_URL:-${OHIF_VIEWER_URL}/auth/realms/lex-pacs}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-lex-clinical}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:?defina OIDC_CLIENT_SECRET}
      CLINICAL_LOCAL_AUTH_ENABLED: ${CLINICAL_LOCAL_AUTH_ENABLED:-false}
      CLINICAL_BOOTSTRAP_USER: ${CLINICAL_BOOTSTRAP_USER:-}
      CLINICAL_BOOTSTRAP_PASSWORD: ${CLINICAL_BOOTSTRAP_PASSWORD:-}
      BACKUP_RETENTION_DAILY: ${BACKUP_RETENTION_DAILY:-7}
      BACKUP_RETENTION_WEEKLY: ${BACKUP_RETENTION_WEEKLY:-4}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      BACKUP_INTERVAL_HOURS: ${BACKUP_INTERVAL_HOURS:-24}
      BACKUP_STATUS_PATH: /lex-backups/latest-status.json
      LOGIN_RATE_LIMIT_ATTEMPTS: ${LOGIN_RATE_LIMIT_ATTEMPTS:-20}
      LOGIN_RATE_LIMIT_WINDOW_SECONDS: ${LOGIN_RATE_LIMIT_WINDOW_SECONDS:-60}
    volumes:
      - orthanc-config:/orthanc-config
      - lex-reports:/lex-reports
      - lex-audit:/lex-audit
      - orthanc-worklists:/var/lib/orthanc/worklists
      - clinical-htpasswd:/etc/lex-pacs
      - lex-backups:/lex-backups:ro
    depends_on:
      orthanc:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  gateway:
    image: nginx:1.27-alpine
    expose:
      - "80"
    volumes:
      - ./ohif-viewer/nginx/00-lex-security.conf:/etc/nginx/conf.d/00-lex-security.conf:ro
      - ./ohif-viewer/nginx/gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      ohif:
        condition: service_healthy
      patient-portal:
        condition: service_healthy
      orthanc:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/clinica/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres-data:
  orthanc-storage:
  orthanc-config:
  orthanc-worklists:
  lex-reports:
  lex-audit:
  clinical-htpasswd:
  keycloak-import:
  lex-backups:
