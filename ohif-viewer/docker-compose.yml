version: '3.8'

# Versão do produto LEX PACS — arquivo LEX_PACS_VERSION e docs/UPGRADE.md
services:
  database:
    image: "lex-pacs/database:${LEX_PACS_VERSION:-0.7.0}"
    build:
      context: ./postgres
      dockerfile: Dockerfile
    container_name: database
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-orthanc}
      POSTGRES_USER: ${POSTGRES_USER:-orthanc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orthanc}
    volumes:
      - database-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-orthanc} -d ${POSTGRES_DB:-orthanc} && test -f /var/lib/postgresql/data/.lex-password-synced
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  server:
    image: "lex-pacs/orthanc:${LEX_PACS_VERSION:-0.7.0}"
    container_name: server
    build:
      context: ./orthanc
      dockerfile: Dockerfile
    environment:
      POSTGRES_HOST: database
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-orthanc}
      POSTGRES_DB: ${POSTGRES_DB:-orthanc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orthanc}
    ports:
      - "8042:8042"   # somente desenvolvimento; omitir em produção (ver docker-compose.prod.yml)
      - "4242:4242"   # DICOM C-STORE (modalidades); restringir firewall em produção
    volumes:
      - server-config:/orthanc-config
      - server-data:/var/lib/orthanc/storage
      - server-worklists:/var/lib/orthanc/worklists
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pid=$(cat /orthanc-config/orthanc.pid 2>/dev/null) && kill -0 \"$$pid\" 2>/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 120s
    restart: unless-stopped

  web-viewer:
    image: "lex-pacs/viewer:${LEX_PACS_VERSION:-0.7.0}"
    build:
      context: .
      dockerfile: Dockerfile
      target: ohif
      args:
        LEX_PACS_VERSION: ${LEX_PACS_VERSION:-0.7.0}
    container_name: web-viewer
    expose:
      - "80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  portal:
    image: "lex-pacs/portal:${LEX_PACS_VERSION:-0.7.0}"
    build:
      context: ../lex-pacs-portal
      dockerfile: Dockerfile
      args:
        LEX_PACS_VERSION: ${LEX_PACS_VERSION:-0.7.0}
    container_name: portal
    expose:
      - "8080"
    environment:
      ORTHANC_URL: http://server:8042
      OHIF_VIEWER_URL: ${OHIF_VIEWER_URL:-http://localhost:3000}
      JWT_SECRET: ${PORTAL_JWT_SECRET:-change-me-in-production}
      PORTAL_FALLBACK_CODE: ${PORTAL_FALLBACK_CODE:-}
      VIEWER_TOKEN_EXPIRE_MINUTES: ${VIEWER_TOKEN_EXPIRE_MINUTES:-30}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      ORTHANC_CONFIG_PATH: /orthanc-config/orthanc.json
      REPORTS_DATA_PATH: /lex-reports
      AUDIT_DATA_PATH: /lex-audit
      ORTHANC_WORKLIST_PATH: /var/lib/orthanc/worklists
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orthanc}
      LEX_PACS_VERSION: ${LEX_PACS_VERSION:-0.7.0}
      OIDC_ENABLED: ${OIDC_ENABLED:-true}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-http://auth:8080/auth/realms/lex-pacs}
      OIDC_PUBLIC_ISSUER_URL: ${OIDC_PUBLIC_ISSUER_URL:-http://localhost:3000/auth/realms/lex-pacs}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-lex-clinical}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-lex-clinical-dev-secret}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      AD_BIND_PASSWORD: ${AD_BIND_PASSWORD:-}
      CLINICAL_LOCAL_AUTH_ENABLED: ${CLINICAL_LOCAL_AUTH_ENABLED:-true}
      BACKUP_RETENTION_DAILY: ${BACKUP_RETENTION_DAILY:-7}
      BACKUP_RETENTION_WEEKLY: ${BACKUP_RETENTION_WEEKLY:-4}
      LOGIN_RATE_LIMIT_ATTEMPTS: ${LOGIN_RATE_LIMIT_ATTEMPTS:-20}
      LOGIN_RATE_LIMIT_WINDOW_SECONDS: ${LOGIN_RATE_LIMIT_WINDOW_SECONDS:-60}
      BACKUP_STATUS_PATH: /lex-backups/latest-status.json
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      BACKUP_INTERVAL_HOURS: ${BACKUP_INTERVAL_HOURS:-24}
    volumes:
      - server-config:/orthanc-config
      - lex-reports:/lex-reports
      - lex-audit:/lex-audit
      - server-worklists:/var/lib/orthanc/worklists
      - ./nginx/.htpasswd:/etc/lex-pacs/htpasswd:ro
      - ./backups:/lex-backups:ro
    depends_on:
      server:
        condition: service_healthy
      auth:
        condition: service_started
    restart: unless-stopped

  auth:
    image: quay.io/keycloak/keycloak:26.0
    container_name: auth
    command: start-dev --import-realm --http-port=8080 --http-relative-path=/auth
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_RELATIVE_PATH: /auth
      KC_PROXY: edge
    volumes:
      - ./keycloak/lex-pacs-realm.json:/opt/keycloak/data/import/lex-pacs-realm.json:ro
    expose:
      - "8080"
    restart: unless-stopped

  backup:
    profiles: ["backup"]
    image: docker:27-cli
    container_name: backup
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./scripts:/scripts:ro
      - ./backups:/backups
      - ./LEX_PACS_VERSION:/compose/LEX_PACS_VERSION:ro
      - ./docker-compose.yml:/compose/docker-compose.yml:ro
      - ./nginx/.htpasswd:/compose/nginx/.htpasswd:ro
      - server-config:/orthanc-config:ro
    environment:
      BACKUP_ROOT: /backups
      PORTAL_OPS_ENV: /orthanc-config/portal-ops.env
      BACKUP_INTERVAL_HOURS: ${BACKUP_INTERVAL_HOURS:-24}
      BACKUP_RETENTION_DAILY: ${BACKUP_RETENTION_DAILY:-7}
      BACKUP_RETENTION_WEEKLY: ${BACKUP_RETENTION_WEEKLY:-4}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      COMPOSE_PROJECT_DIR: /compose
      POSTGRES_USER: ${POSTGRES_USER:-orthanc}
      POSTGRES_DB: ${POSTGRES_DB:-orthanc}
    working_dir: /compose
    entrypoint: ["/bin/sh", "-c", "apk add --no-cache python3 >/dev/null 2>&1 && exec /scripts/backup-scheduler.sh"]
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped

  gateway:
    image: nginx:1.27-alpine
    container_name: gateway
    ports:
      - "3000:80"
    volumes:
      - ./nginx/00-lex-security.conf:/etc/nginx/conf.d/00-lex-security.conf:ro
      - ./nginx/gateway.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      - web-viewer
      - portal
      - server
    restart: unless-stopped

volumes:
  server-data:
  server-config:
  server-worklists:
  lex-reports:
  lex-audit:
  database-data:
