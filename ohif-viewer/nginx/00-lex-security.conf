# Zonas e mapas de segurança LEX PACS (http context via conf.d)

# S10 — rate limit em endpoints de login (por IP)
limit_req_zone $binary_remote_addr zone=lex_login:10m rate=20r/m;
limit_req_status 429;

# S11 — HSTS quando TLS termina no proxy externo
map $http_x_forwarded_proto $lex_hsts_header {
    https   "max-age=31536000; includeSubDomains";
    default "";
}
