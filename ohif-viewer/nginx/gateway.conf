server {
    listen 80;
    server_name _;
    server_tokens off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security $lex_hsts_header always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' blob:; worker-src 'self' blob:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

    # Assets compartilhados (portal + login clínico)
    location /static/ {
        proxy_pass http://patient-portal:8080/static/;
        proxy_set_header Host $host;
    }

    # ── Login clínico (público) ──
    location /clinica/ {
        proxy_pass http://patient-portal:8080/clinica/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Portal do paciente (sem autenticação clínica) ──
    location /paciente/ {
        proxy_pass http://patient-portal:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /paciente-api/ {
        rewrite ^/paciente-api/(.*)$ /api/$1 break;
        proxy_pass http://patient-portal:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /paciente-api/auth/login {
        limit_req zone=lex_login burst=5 nodelay;
        rewrite ^/paciente-api/(.*)$ /api/$1 break;
        proxy_pass http://patient-portal:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Login/logout clínico (público)
    location = /clinica-api/auth/clinical/login {
        limit_req zone=lex_login burst=5 nodelay;
        rewrite ^/clinica-api/(.*)$ /api/$1 break;
        proxy_pass http://patient-portal:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /clinica-api/auth/clinical/logout {
        rewrite ^/clinica-api/(.*)$ /api/$1 break;
        proxy_pass http://patient-portal:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Cookie $http_cookie;
    }

    location = /clinica-api/auth/clinical/config {
        rewrite ^/clinica-api/(.*)$ /api/$1 break;
        proxy_pass http://patient-portal:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /clinica-api/auth/clinical/oidc/login {
        rewrite ^/clinica-api/(.*)$ /api/$1 break;
        proxy_pass http://patient-portal:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /clinica-api/auth/clinical/oidc/callback {
        rewrite ^/clinica-api/(.*)$ /api/$1 break;
        proxy_pass http://patient-portal:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Cookie $http_cookie;
    }

    # API clínica — sessão via cookie
    location /clinica-api/ {
        auth_request /internal/auth/clinical;
        error_page 401 = @clinica_login;

        rewrite ^/clinica-api/(.*)$ /api/$1 break;
        proxy_pass http://patient-portal:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 120s;
        client_max_body_size 32M;
    }

    location @clinica_login {
        return 302 /clinica/login?next=$request_uri;
    }

    location = /internal/auth/clinical {
        internal;
        proxy_pass http://patient-portal:8080/api/auth/validate-clinical;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Authorization $http_authorization;
    }

    location = /paciente-api/auth/validate-viewer-cookie {
        return 404;
    }

    location = /paciente-api/auth/validate-clinical {
        return 404;
    }

    location = /paciente-api/auth/validate-dicom-access {
        return 404;
    }

    location = /internal/auth/viewer-cookie {
        internal;
        proxy_pass http://patient-portal:8080/api/auth/validate-viewer-cookie;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Original-URI $request_uri;
    }

    location = /internal/auth/dicom-access {
        internal;
        proxy_pass http://patient-portal:8080/api/auth/validate-dicom-access;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Original-URI $request_uri;
    }

    # ── DICOMweb / WADO ──
    location /dicom-web {
        auth_request /internal/auth/dicom-access;
        error_page 401 = @clinica_login;

        proxy_pass http://orthanc:8042/dicom-web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Authorization $http_authorization;
        proxy_http_version 1.1;
        client_max_body_size 2048M;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /wado {
        auth_request /internal/auth/dicom-access;
        error_page 401 = @clinica_login;

        proxy_pass http://orthanc:8042/wado;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Authorization $http_authorization;
        proxy_http_version 1.1;
        client_max_body_size 2048M;
        proxy_read_timeout 300s;
    }

    # ── Viewer OHIF ──
    location /viewer/ {
        auth_request /internal/auth/dicom-access;
        error_page 401 = @clinica_login;

        proxy_pass http://ohif:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Authorization $http_authorization;
    }

    location = /viewer {
        auth_request /internal/auth/dicom-access;
        error_page 401 = @clinica_login;

        proxy_pass http://ohif:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Authorization $http_authorization;
    }

    location = / {
        return 302 /clinica/login;
    }

    location / {
        return 302 /clinica/login;
    }
}
