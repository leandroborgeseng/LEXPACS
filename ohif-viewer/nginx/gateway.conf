server {
    listen 80;
    server_name _;
    server_tokens off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Portal do paciente (sem autenticação clínica) ──
    location /paciente/ {
        proxy_pass http://patient-portal:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /paciente-api/ {
        rewrite ^/paciente-api/(.*)$ /api/$1 break;
        proxy_pass http://patient-portal:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API clínica (configurações do PACS) — Basic ou OIDC
    location /clinica-api/ {
        auth_basic "LEX PACS Clinica";
        auth_basic_user_file /etc/nginx/.htpasswd;
        auth_request /internal/auth/clinical;
        satisfy any;

        rewrite ^/clinica-api/(.*)$ /api/$1 break;
        proxy_pass http://patient-portal:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Clinic-User $remote_user;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 120s;
        client_max_body_size 32M;
    }

    location = /internal/auth/clinical {
        internal;
        proxy_pass http://patient-portal:8080/api/auth/validate-clinical;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Clinic-User $remote_user;
    }

    # Bloqueia validação de cookie via URL pública (uso apenas interno abaixo)
    location = /paciente-api/auth/validate-viewer-cookie {
        return 404;
    }

    location = /paciente-api/auth/validate-clinical {
        return 404;
    }

    location = /paciente-api/auth/validate-dicom-access {
        return 404;
    }

    # Validação interna: cookie temporário do viewer (paciente)
    location = /internal/auth/viewer-cookie {
        internal;
        proxy_pass http://patient-portal:8080/api/auth/validate-viewer-cookie;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Original-URI $request_uri;
    }

    location = /internal/auth/dicom-access {
        internal;
        proxy_pass http://patient-portal:8080/api/auth/validate-dicom-access;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Clinic-User $remote_user;
        proxy_set_header X-Original-URI $request_uri;
    }

    # ── DICOMweb / WADO (clínica OU paciente com cookie de viewer) ──
    location /dicom-web {
        auth_basic "LEX PACS Clinica";
        auth_basic_user_file /etc/nginx/.htpasswd;
        auth_request /internal/auth/dicom-access;
        satisfy any;

        proxy_pass http://orthanc:8042/dicom-web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
        proxy_http_version 1.1;
        client_max_body_size 2048M;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /wado {
        auth_basic "LEX PACS Clinica";
        auth_basic_user_file /etc/nginx/.htpasswd;
        auth_request /internal/auth/dicom-access;
        satisfy any;

        proxy_pass http://orthanc:8042/wado;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
        proxy_http_version 1.1;
        client_max_body_size 2048M;
        proxy_read_timeout 300s;
    }

    # ── Viewer OHIF em /viewer/ (clínica OU paciente com cookie) ──
    location /viewer/ {
        auth_basic "LEX PACS Clinica";
        auth_basic_user_file /etc/nginx/.htpasswd;
        auth_request /internal/auth/dicom-access;
        satisfy any;

        proxy_pass http://ohif:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
    }

    location = /viewer {
        auth_basic "LEX PACS Clinica";
        auth_basic_user_file /etc/nginx/.htpasswd;
        auth_request /internal/auth/dicom-access;
        satisfy any;

        proxy_pass http://ohif:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
    }

    # ── Raiz → worklist (login só em /viewer/) ──
    location = / {
        return 302 /viewer/;
    }

    location / {
        auth_basic "LEX PACS Clinica";
        auth_basic_user_file /etc/nginx/.htpasswd;
        return 404;
    }
}
