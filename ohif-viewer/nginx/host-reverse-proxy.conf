# Proxy do nginx do HOST (Ubuntu) → gateway Docker do LEX PACS.
#
# Uso local (gateway exposto em :3000 via docker-compose.coolify.local.yml):
#   sudo cp ohif-viewer/nginx/host-reverse-proxy.conf /etc/nginx/sites-available/lex-pacs
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo ln -sf /etc/nginx/sites-available/lex-pacs /etc/nginx/sites-enabled/lex-pacs
#   sudo nginx -t && sudo systemctl reload nginx
#
# Coolify: não use este arquivo — o Traefik do Coolify já aponta ao serviço gateway.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 2048M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
